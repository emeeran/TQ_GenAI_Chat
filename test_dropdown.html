<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropdown Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="static/styles.css">
</head>
<body>
    <div class="container mt-5">
        <h2>Dropdown Test</h2>
        
        <div class="row">
            <div class="col-md-6">
                <h4>Using form-select (Bootstrap 5)</h4>
                <div class="form-group mb-3">
                    <label for="test-select-1">API Provider</label>
                    <select class="form-select" id="test-select-1">
                        <option value="groq">Groq</option>
                        <option value="openai">OpenAI</option>
                        <option value="mistral">Mistral</option>
                        <option value="anthropic">Anthropic</option>
                    </select>
                </div>
            </div>
            
            <div class="col-md-6">
                <h4>Using form-control (Legacy)</h4>
                <div class="form-group mb-3">
                    <label for="test-select-2">Model</label>
                    <select class="form-control" id="test-select-2">
                        <option value="">Select Model</option>
                        <option value="model1">Model 1</option>
                        <option value="model2">Model 2</option>
                        <option value="model3">Model 3</option>
                    </select>
                </div>
            </div>
        </div>
        
        <div class="mt-4">
            <button class="btn btn-primary" onclick="toggleTheme()">Toggle Dark Theme</button>
        </div>
    </div>

    <script>
        function toggleTheme() {
            document.body.classList.toggle('theme-dark');
            document.body.classList.toggle('theme-light');
        }
        
        // Initialize light theme
        document.body.classList.add('theme-light');
        
        // Test dropdown change events
        document.getElementById('test-select-1').addEventListener('change', function() {
            console.log('Form-select changed to:', this.value);
        });
        
        document.getElementById('test-select-2').addEventListener('change', function() {
            console.log('Form-control changed to:', this.value);
        });
    </script>
</body>
</html>
