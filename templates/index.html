<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TQ GenAI Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/static/styles/modern.css">
    <link rel="stylesheet" href="/static/styles/interactions.css">
    <link rel="stylesheet" href="/static/styles/components.css">
    <link rel="stylesheet" href="/static/styles/file-uploader.css">
    <link rel="stylesheet" href="/static/styles/sidebar-improvements.css">
</head>

<body>
    <header class="app-header">
        <div class="container flex justify-between items-center">
            <div class="app-title">
                <i class="fas fa-robot"></i>
                <span>TQ GenAI Chat</span>
            </div>

            <div class="app-nav">
                <button id="sidebar-toggle" class="sidebar-toggle btn btn-outline">
                    <i class="fas fa-sliders-h"></i>
                </button>

                <div class="theme-toggle">
                    <i class="fas fa-sun"></i>
                    <label class="theme-toggle-slider">
                        <input type="checkbox" id="theme-toggle-input">
                        <span class="slider"></span>
                    </label>
                    <i class="fas fa-moon"></i>
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="chat-container">
            <aside class="sidebar">
                <div class="model-selector card">
                    <div class="card-header">
                        <i class="fas fa-cogs"></i> Controls
                    </div>
                    <div class="card-body">
                        <label for="provider-select">Provider:</label>
                        <div class="model-select-container">
                            <select id="provider-select" class="model-select">
                                <option value="">Loading providers...</option>
                            </select>
                        </div>
                        <label for="model-select">Select Model:</label>
                        <div class="model-select-container">
                            <select id="model-select" class="model-select">
                                <option value="">Select a provider first</option>
                            </select>
                            <div class="model-status"></div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-file-alt"></i> Documents
                        <button id="upload-btn" class="btn btn-outline btn-sm">
                            <i class="fas fa-upload"></i> Upload
                        </button>
                    </div>
                    <div class="card-body">
                        <div class="file-stats">
                            <span id="doc-count">0 documents</span>
                            <span id="total-size">0 KB</span>
                        </div>
                        <div id="file-list" class="file-list">
                            <!-- File items will appear here -->
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-history"></i> Chat History
                    </div>
                    <div class="card-body">
                        <div id="chat-history">
                            <!-- Chat history will appear here -->
                        </div>
                        <div class="flex gap-sm mt-md">
                            <button id="save-chat" class="btn btn-outline">
                                <i class="fas fa-save"></i> Save
                            </button>
                            <button id="export-chat" class="btn btn-outline">
                                <i class="fas fa-file-export"></i> Export
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Add a new section for chat settings -->
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-sliders-h"></i> Settings
                    </div>
                    <div class="card-body">
                        <div class="setting-item">
                            <span>Enable context</span>
                            <label class="switch">
                                <input type="checkbox" id="context-enabled" checked>
                                <span class="slider round"></span>
                            </label>
                        </div>
                        <div class="setting-item">
                            <span>Auto-format code</span>
                            <label class="switch">
                                <input type="checkbox" id="code-format" checked>
                                <span class="slider round"></span>
                            </label>
                        </div>
                    </div>
                </div>
            </aside>

            <main class="main-content">
                <div class="chat-messages" id="chat-messages">
                    <div class="welcome-message message message-ai">
                        <div class="message-avatar">
                            <i class="fas fa-robot"></i>
                        </div>
                        <div class="message-bubble">
                            <div class="message-text">
                                <h3>Welcome to TQ GenAI Chat!</h3>
                                <p>Select an AI provider and model from the sidebar, then start chatting.</p>
                                <p>You can also upload documents to provide context for your conversations.</p>
                            </div>
                        </div>
                    </div>
                    <!-- Chat messages will appear here -->
                </div>

                <div class="chat-input-container">
                    <form id="chat-form" class="chat-input-form">
                        <textarea id="chat-input" class="chat-input" placeholder="Type your message here..."
                            rows="2"></textarea>
                        <button type="submit" class="btn">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </form>
                    <div class="flex gap-md mt-sm">
                        <button id="mic-btn" class="btn btn-outline btn-sm">
                            <i class="fas fa-microphone"></i>
                        </button>
                        <div id="recording-status"></div>
                    </div>
                </div>
            </main>
        </div>

        <!-- Document preview area -->
        <div id="document-content" class="document-content hidden"></div>
    </div>

    <script src="/static/js/keyboard-shortcuts.js"></script>
    <script src="/static/js/accessibility.js"></script>
    <script src="/static/js/notification-system.js"></script>
    <script src="/static/js/loading-indicators.js"></script>
    <script src="/static/js/chat-enhancements.js"></script>
    <script src="/static/js/chat-client.js"></script>
    <script src="/static/js/file-uploader.js"></script>
    <script src="/static/js/ui-preferences.js"></script>
    <script src="/static/js/modern-ui.js"></script>
    <script src="/static/js/sidebar.js"></script>
</body>

</html>
