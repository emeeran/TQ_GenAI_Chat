<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Developer Agent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-3 sidebar">
                <h3>Settings</h3>
                <div class="form-group">
                    <label for="provider">API Provider</label>
                    <select class="form-control" id="provider" onchange="updateModels()">
                        <option value="groq" data-default="deepseek-r1-distill-llama-70b">Groq</option>
                        <option value="openai" data-default="gpt-4o-mini">OpenAI</option>
                        <option value="mistral" data-default="codestral-latest">Mistral</option>
                        <option value="anthropic" data-default="claude-3-5-sonnet-latest">Anthropic</option>
                        <option value="xai" data-default="grok-latest">X AI</option>
                        <option value="deepseek" data-default="deepseek-r1-70b">Deepseek</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="model">Model</label>
                    <select class="form-control" id="model" disabled>
                        <option value="">Select Model</option>
                    </select>
                </div>

                <!-- Action Buttons -->
                <div class="action-buttons mt-4">
                    <div class="row mb-2">
                        <div class="col-6">
                            <button class="btn btn-success btn-block w-100" onclick="saveChat()">
                                <i class="fas fa-save"></i> Save
                            </button>
                        </div>
                        <div class="col-6">
                            <button class="btn btn-warning btn-block w-100" onclick="retryLast()">
                                <i class="fas fa-redo"></i> Retry
                            </button>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-6">
                            <button class="btn btn-info btn-block w-100" onclick="exportToMd()">
                                <i class="fas fa-download"></i> Export
                            </button>
                        </div>
                        <div class="col-6">
                            <button class="btn btn-primary btn-block w-100" onclick="loadSaved()">
                                <i class="fas fa-upload"></i> Load
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Loading Indicator -->
                <div id="processing" class="processing-indicator mt-3 d-none">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Processing...</span>
                    </div>
                    <span class="ms-2">Processing request...</span>
                </div>

                <!-- Feedback Section -->
                <div id="feedback" class="feedback-section mt-3 d-none">
                    <div class="d-flex justify-content-center">
                        <button class="btn btn-outline-success me-2" onclick="provideFeedback(true)">
                            <i class="fas fa-thumbs-up"></i>
                        </button>
                        <button class="btn btn-outline-danger" onclick="provideFeedback(false)">
                            <i class="fas fa-thumbs-down"></i>
                        </button>
                    </div>
                </div>
            </div>
            <!-- Chat Area -->
            <div class="col-md-9 chat-area">
                <div class="chat-box" id="chat-box"></div>
                <div class="input-container">
                    <button id="record-button" class="btn btn-primary" onclick="toggleRecording()">
                        <i class="fas fa-microphone"></i>
                    </button>
                    <input type="text" id="user-input" class="form-control" placeholder="Type your message...">
                    <button class="btn btn-primary" onclick="sendMessage()">Send</button>
                    <button id="speak-button" class="btn btn-primary" onclick="speakText(lastAiResponse)">
                        <i class="fas fa-volume-up"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script>
        document.getElementById('provider').addEventListener('change', async function () {
            const modelSelect = document.getElementById('model');
            const provider = this.value;

            if (!provider) {
                modelSelect.disabled = true;
                modelSelect.innerHTML = '<option value="">Select Model</option>';
                return;
            }

            try {
                const response = await fetch(`/get_models/${provider}`);
                const models = await response.json();

                modelSelect.innerHTML = '<option value="">Select Model</option>';
                models.forEach(model => {
                    const option = document.createElement('option');
                    option.value = model;
                    option.textContent = model;
                    modelSelect.appendChild(option);
                });

                modelSelect.disabled = false;
            } catch (error) {
                console.error('Error fetching models:', error);
            }
        });

        const sendMessage = async () => {
            const message = document.getElementById('user-input').value;
            const provider = document.getElementById('provider').value;
            const model = document.getElementById('model').value;

            if (!message || !provider || !model) {
                alert('Please fill in all fields');
                return;
            }

            const response = await fetch('/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: message,
                    provider: provider,
                    model: model
                })
            });
        };
    </script>
</body>

</html>
